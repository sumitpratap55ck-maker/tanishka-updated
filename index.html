<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanishka ❤️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #ff9ec4, #ffc7dd, #ffd9ea);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Floating Hearts Background */
        .heart {
            position: fixed;
            font-size: 24px;
            animation: float 8s linear infinite;
            z-index: -1;
            user-select: none;
        }

        @keyframes float {
            from { transform: translateY(110vh); }
            to { transform: translateY(-20vh); }
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 35px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(233, 30, 99, 0.2);
            text-align: center;
            width: min(90%, 500px);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1, h2 { color: #e91e63; margin-bottom: 15px; }
        
        .pink-text {
            color: #e91e63;
            font-weight: bold;
            font-size: 24px;
            margin: 10px 0;
        }

        p { font-size: 20px; margin: 15px 0; color: #444; }

        button {
            padding: 14px 28px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
        }

        #yes, .btn-continue {
            background: #e91e63;
            color: white;
            box-shadow: 0 4px 15px rgba(233, 30, 99, 0.3);
        }

        #yes:hover, .btn-continue:hover {
            transform: scale(1.05);
            background: #d81b60;
        }

        #no {
            background: #888;
            color: white;
            position: relative;
            z-index: 10;
        }

        .hidden { display: none; }

        select {
            padding: 12px;
            font-size: 18px;
            border-radius: 12px;
            margin: 10px;
            border: 2px solid #ff9ec4;
            outline: none;
            background: white;
            cursor: pointer;
            width: 200px;
        }

        .teddy {
            width: 200px;
            height: auto;
            margin: 15px auto;
            display: block;
            border-radius: 15px;
        }

        .label-tag {
            display: block;
            font-weight: bold;
            margin-top: 15px;
            color: #e91e63;
        }
    </style>
</head>
<body>

    <!-- PAGE 1: THE BIG QUESTION -->
    <div id="page1" class="card">
        <h1>❤️ Tanishka ❤️</h1>
        <p><b>Kya aap mere saath chaap khane chalegi? 😋❤️</b></p>
        <button id="yes">Yes ❤️</button>
        <button id="no">No 🙈</button>
    </div>

    <!-- PAGE 2: THANK YOU & TEDDY -->
    <div id="page2" class="card hidden">
        <h1>🥳 Hey Hey!</h1>
        <p class="pink-text">Thank God you said yes! ❤️</p>
        <!-- Dancing Teddy -->
        <img class="teddy" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM2Zic3B6YmZ4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/10vXSMTAY7d904/giphy.gif" alt="Dancing Teddy">
        <button class="btn-continue" onclick="navigateTo(3)">Continue ❤️</button>
    </div>

    <!-- PAGE 3: DATE & TIME SELECTION -->
    <div id="page3" class="card hidden">
        <h1>Great! ❤️</h1>
        <p>Pick a time that suits you:</p>
        
        <label class="label-tag">Select Date</label>
        <select id="date">
            <option value="13 June">13 June</option>
            <option value="14 June">14 June</option>
        </select>
        
        <label class="label-tag">Select Time</label>
        <select id="time">
            <option value="4:00 PM">4:00 PM</option>
            <option value="5:00 PM">5:00 PM</option>
        </select>
        
        <br><br>
        <button class="btn-continue" onclick="finishSelection()">Continue ❤️</button>
    </div>

    <!-- PAGE 4: FINAL SUMMARY -->
    <div id="page4" class="card hidden">
        <h1>Yay! I am so happy! ❤️</h1>
        <!-- Another Dancing Teddy -->
        <img class="teddy" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbnZuejN3eXh3eXh3eXh3eXh3eXh3eXh3eXh3eXh3eXh3eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/L8G2fXoDeE70WvC0pA/giphy.gif" alt="Happy Teddy">
        <p id="finalText" style="line-height: 1.6;"></p>
        <h2>😋 See you soon for Chaap ❤️</h2>
    </div>

    <script>
        // Background Hearts Generation
        for(let i=0; i<40; i++){
            let h = document.createElement("div");
            h.className = "heart";
            h.innerHTML = "❤️";
            h.style.left = Math.random() * 100 + "vw";
            h.style.animationDuration = (4 + Math.random() * 6) + "s";
            h.style.fontSize = (Math.random() * 20 + 10) + "px";
            h.style.opacity = Math.random();
            document.body.appendChild(h);
        }

        // NO BUTTON LOGIC: Runs away ONLY on click
        const noBtn = document.getElementById("no");
        noBtn.addEventListener("click", function() {
            let x = Math.random() * (window.innerWidth - 150);
            let y = Math.random() * (window.innerHeight - 100);
            noBtn.style.position = "fixed";
            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";
        });

        // NAVIGATION SYSTEM
        function navigateTo(pageNum) {
            // Hide all pages
            document.querySelectorAll('.card').forEach(card => card.classList.add('hidden'));
            // Show requested page
            document.getElementById('page' + pageNum).classList.remove('hidden');
        }

        document.getElementById("yes").onclick = function() {
            navigateTo(2);
        };

        function finishSelection() {
            const dateValue = document.getElementById("date").value;
            const timeValue = document.getElementById("time").value;
            
            // Set the final summary text
            document.getElementById("finalText").innerHTML = 
                "❤️ Date Selected: <b>" + dateValue + "</b><br>" +
                "⏰ Time Selected: <b>" + timeValue + "</b><br><br>" +
                "Can't wait! ❤️";
                
            navigateTo(4);
        }
    </script>
</body>
</html>
